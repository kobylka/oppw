<VirtualHost *:80>
    ServerName monitor.example.com
    Redirect permanent / https://monitor.example.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName monitor.example.com
    DocumentRoot /var/www/oppw-api

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/monitor.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/monitor.example.com/privkey.pem

    <Directory /var/www/oppw-api>
        AllowOverride All
        Require all granted
        Options -Indexes
    </Directory>

    SetEnvIf Authorization "(.+)" HTTP_AUTHORIZATION=$1
</VirtualHost>
